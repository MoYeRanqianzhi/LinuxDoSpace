name: Container Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      deploy_to_debian:
        description: 'Build image and deploy it to the Debian server'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-debian:
    name: Deploy To Debian
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # GitHub Actions does not allow secrets.* in job-level if expressions.
    # We only gate on the manual input here, then validate the required secrets
    # inside the job so the workflow file stays syntactically valid.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to_debian }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0

          for secret_name in \
            DEPLOY_HOST \
            DEPLOY_USER \
            DEPLOY_SSH_PRIVATE_KEY \
            DEPLOY_ENV_FILE
          do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment env file
        shell: bash
        run: |
          printf '%s\n' "$DEPLOY_ENV_FILE" > deploy/.env

      - name: Log in to GHCR on runner
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull deployment image and export bundle
        shell: bash
        run: |
          DEPLOY_IMAGE_REF="ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          docker pull "$DEPLOY_IMAGE_REF"
          docker save "$DEPLOY_IMAGE_REF" | gzip > deploy/linuxdospace-image.tar.gz

      - name: Upload compose bundle to Debian server
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/linuxdospace}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -P "$DEPLOY_PORT" deploy/docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp -P "$DEPLOY_PORT" deploy/.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
          scp -P "$DEPLOY_PORT" deploy/linuxdospace-image.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/linuxdospace-image.tar.gz"

      - name: Load image and restart compose stack
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/linuxdospace}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
            cd '$DEPLOY_PATH' && \
            gunzip -c linuxdospace-image.tar.gz | docker load && \
            docker compose up -d && \
            docker image prune -f && \
            rm -f linuxdospace-image.tar.gz"
